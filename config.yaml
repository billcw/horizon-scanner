database:
  path: data/horizon_scanner.db
chromadb:
  path: data/chromadb
  collection_signals: signals
  collection_theses: theses
logging:
  path: logs/horizon_scanner.log
  level: INFO
collectors:
  arxiv:
    enabled: true
    categories:
    - cs.AI
    - cs.LG
    - cs.AR
    - cs.ET
    - quant-ph
    - cond-mat.mtrl-sci
    max_results_per_run: 100
    schedule: daily
  google_trends:
    enabled: true
    schedule: daily
    geo: US
    seed_topics:
    - AI infrastructure
    - orbital computing
    - neuromorphic chip
    - solid state battery
    - quantum error correction
    - grid transformer
    - small modular reactor
    - brain computer interface
    - humanoid robot
    - photonic computing
  reddit:
    enabled: false
    schedule: 6hourly
    subreddits:
    - Futurology
    - technology
    - singularity
    - investing
    - SecurityAnalysis
    post_limit: 25
    min_score: 50
  uspto:
    enabled: true
    mode: keyword
    schedule: weekly
    keywords:
    - neural network accelerator
    - solid state battery
    - quantum error correction
    - silicon photonics
    - solid oxide electrolysis
    - gallium nitride power
    - neuromorphic computing
    - perovskite solar
    cpc_codes:
    - G06N
    - H01L
    - H04B10
    - G16Y
    - B64G
    page_limit: 25
    max_pages_per_keyword: 4
    max_requests_per_run: 40
    lookback_days: 90
    backoff_base_seconds: 2.0
    max_retries: 4
classifier:
  model: claude-haiku-4-5-20251001
  fallback_model: claude-sonnet-4-6
  confidence_threshold: 0.7
  dedup_similarity_threshold: 0.92
  dedup_lookback_days: 90
  cluster_window_days: 30
  cluster_escalation_threshold: 3
thesis:
  step_model: claude-sonnet-4-6
  adversarial_model: claude-sonnet-4-6
  step_max_tokens:
    step1_context: 1000
    step2_viability: 1500
    step3_bottleneck: 1000
    step4_scenarios: 2000
    step5_entities: 2000
    step6_platform: 1500
    step7_adversarial: 3000
    step8_scoring: 1500
  step_models:
    step1_context: null
    step2_viability: null
    step3_bottleneck: null
    step4_scenarios: null
    step5_entities: null
    step6_platform: null
    step7_adversarial: null
    step8_scoring: null
  max_signals_in_context: 10
  signal_abstract_chars: 500
  context_doc_max_chars: 3000
  web_search_max_tokens: 500
  perplexity_model: sonar
  step_timeout_seconds: 90
  max_search_calls_per_step: 3
  max_retries_on_missing_citations: 2
  output_dir: data/exports
  edgar_verify_tickers: true
  edgar_enrichment_depth: 1
  edgar_ip_excerpt_chars: 1500
  edgar_max_companies: 30
monitoring:
  model: claude-haiku-4-5-20251001
  schedule: weekly
  probability_alert_threshold: 0.15
  archive_after_days: 180
enrichment:
  edgar:
    user_agent: HorizonScanner research (billcwenz68@gmail.com)
    lookback_years: 2
    fulltext_max_hits: 10
apis:
  anthropic_base: https://api.anthropic.com
  perplexity_base: https://api.perplexity.ai
  reddit_base: https://www.reddit.com
  arxiv_base: http://export.arxiv.org/api/query
  uspto_base: https://api.uspto.gov/api/v1
